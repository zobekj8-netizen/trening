<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f3efe8">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FitDom">
<meta name="mobile-web-app-capable" content="yes">
<title>FitDom — plan treningowy</title>
<style>
  :root{
    --bg:#f3efe8;
    --card:#fdfbf7;
    --card2:#f1ece2;
    --ink:#2b2823;
    --ink2:#5f594e;
    --muted:#a8a193;
    --line:#e8e1d4;
    --line2:#ddd4c4;
    --accent:#7f8c66;
    --accent-soft:#e7ecdd;
    --serif:'Helvetica Neue',Helvetica,Arial,sans-serif;
    --shadow:0 1px 2px rgba(80,65,45,.03),0 10px 30px rgba(80,65,45,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html{height:100%}
  body{
    min-height:100%;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;
    overflow-x:hidden;-webkit-font-smoothing:antialiased;
    padding-bottom:calc(110px + env(safe-area-inset-bottom,0px));
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 22px}

  header{padding:38px 22px 14px;max-width:520px;margin:0 auto}
  .kicker{font-size:10.5px;letter-spacing:3.5px;color:var(--muted);font-weight:600;text-transform:uppercase}
  .title{font-family:var(--serif);font-size:33px;font-weight:500;letter-spacing:-.3px;margin-top:10px;line-height:1.12}
  .subtitle{color:var(--muted);font-size:13.5px;margin-top:8px;letter-spacing:.2px}

  .stats{display:flex;margin-top:26px;background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
  .stat{flex:1;padding:16px 8px;text-align:center;position:relative}
  .stat+.stat::before{content:"";position:absolute;left:0;top:22%;bottom:22%;width:1px;background:var(--line)}
  .stat b{display:block;font-family:var(--serif);font-size:25px;font-weight:500;color:var(--ink)}
  .stat small{color:var(--muted);font-size:10.5px;font-weight:500;letter-spacing:.3px;margin-top:2px;display:block}

  .view{display:none;animation:fade .3s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  h2.section{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:600;margin:30px 0 14px}

  .note{border-left:2px solid var(--accent);padding:2px 0 2px 16px;font-size:14px;color:var(--ink2);margin-bottom:6px;line-height:1.6}
  .note b{color:var(--ink);font-weight:600}

  /* DAY CARDS */
  .day{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;margin-bottom:12px;cursor:pointer;transition:transform .15s,border-color .15s;box-shadow:var(--shadow)}
  .day:active{transform:scale(.99)}
  .day .accent-dot{flex-shrink:0;width:38px;height:38px;border-radius:50%;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:500;color:var(--accent);font-size:16px}
  .day .row{display:flex;align-items:center;gap:15px}
  .day h3{font-family:var(--serif);font-size:19px;font-weight:500;letter-spacing:-.2px}
  .day .meta{color:var(--muted);font-size:12.5px;margin-top:2px;letter-spacing:.2px}
  .day .meta .done{color:var(--accent);font-weight:600}
  .day .chev{margin-left:auto;color:var(--line2);font-size:24px;font-weight:300}
  .day.done-today{border-color:var(--accent-soft);background:#faf6f0}

  /* WORKOUT */
  #workoutHead{margin:22px 0 6px}
  #workoutHead .tag{font-size:10.5px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
  #workoutHead h2{font-family:var(--serif);font-size:27px;font-weight:500;letter-spacing:-.3px;margin-top:4px}
  .progressbar{height:4px;background:var(--line);border-radius:99px;overflow:hidden;margin:14px 0 4px}
  .progressbar i{display:block;height:100%;width:0;background:var(--accent);border-radius:99px;transition:width .4s}

  .seclabel{font-size:11px;text-transform:uppercase;letter-spacing:2px;font-weight:600;color:var(--muted);margin:26px 0 14px;display:flex;align-items:center;gap:12px}
  .seclabel::after{content:"";flex:1;height:1px;background:var(--line)}

  .ex{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:12px;transition:opacity .25s;box-shadow:var(--shadow)}
  .ex.checked{opacity:.45}
  .ex .top{display:flex;align-items:flex-start;gap:13px}
  .ex .num{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:500;font-size:14px}
  .ex h4{font-family:var(--serif);font-size:18px;font-weight:500;letter-spacing:-.2px;line-height:1.25}
  .ex .sr{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:3px;letter-spacing:.3px}
  .ex .cue{font-size:13.5px;color:var(--ink2);margin-top:12px;line-height:1.6}
  .ex .cue b{color:var(--ink);font-weight:600}
  .ex .acts{display:flex;gap:8px;margin-top:16px}
  .btn{flex:1;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:600;letter-spacing:.2px;cursor:pointer;font-family:inherit;transition:all .15s}
  .btn.ghost{background:transparent;color:var(--ink2);border:1px solid var(--line2)}
  .btn.ghost:active{background:var(--card2)}
  .btn.fill{background:var(--accent);color:#fff}
  .btn.fill:active{filter:brightness(.95)}
  .ex.checked .btn.fill{background:#9aa783}

  .animbox{margin:15px 0 2px;background:#f6f1e9;border:1px solid var(--line);border-radius:16px;overflow:hidden;position:relative}
  .animbox .hint{position:absolute;top:9px;right:12px;font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;z-index:2}
  .animbox.photo{height:214px;background:#15171a}
  .animbox.photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#15171a}
  .animbox.photo .pf1{animation:xfade 3.2s ease-in-out infinite}
  .animbox.photo .hint{color:#d8d2c6;background:rgba(0,0,0,.4);padding:3px 8px;border-radius:9px}
  @keyframes xfade{0%,18%{opacity:0}40%,68%{opacity:1}90%,100%{opacity:0}}
  .figsvg{width:100%;height:152px;display:block}
  .figsvg .torso{fill:none;stroke:#b3835f;stroke-width:21;stroke-linecap:round}
  .figsvg .limbs{fill:none;stroke:#cdac8c;stroke-width:12;stroke-linecap:round;stroke-linejoin:round}
  .figsvg .limbB{fill:none;stroke:#9a6f4c;stroke-width:11;stroke-linecap:round;stroke-linejoin:round;opacity:.45}
  .figsvg .head{fill:#b3835f}
  .figsvg .ground{stroke:#e0d8c8;stroke-width:3;stroke-linecap:round}
  .ex.b .figsvg .torso{stroke:#7d96a2} .ex.b .figsvg .limbs{stroke:#aec2cb} .ex.b .figsvg .limbB{stroke:#5f7c8a} .ex.b .figsvg .head{fill:#7d96a2}
  .ex.c .figsvg .torso{stroke:#8a9b6f} .ex.c .figsvg .limbs{stroke:#b8c69d} .ex.c .figsvg .limbB{stroke:#6b7c52} .ex.c .figsvg .head{fill:#8a9b6f}
  .ex.w .figsvg .torso{stroke:#c2a062} .ex.w .figsvg .limbs{stroke:#ddc794} .ex.w .figsvg .limbB{stroke:#9c7e3f} .ex.w .figsvg .head{fill:#c2a062}
  .ex.s .figsvg .torso{stroke:#75a094} .ex.s .figsvg .limbs{stroke:#a7cabf} .ex.s .figsvg .limbB{stroke:#547a6f} .ex.s .figsvg .head{fill:#75a094}

  .finishbar{margin:10px 0 20px}
  .btn.big{width:100%;padding:17px;font-size:15px;border-radius:16px;background:var(--accent);color:#fff;border:none;font-weight:600;letter-spacing:.3px;cursor:pointer;font-family:inherit}
  .btn.big:disabled{background:var(--card);color:var(--muted);border:1px solid var(--line)}

  /* TIMER MODAL */
  .modal{position:fixed;inset:0;background:rgba(43,40,35,.3);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;z-index:50;padding:24px}
  .modal.open{display:flex}
  .timerbox{background:var(--card);border-radius:26px;padding:30px 26px;text-align:center;width:100%;max-width:330px;box-shadow:0 24px 70px rgba(60,45,30,.25)}
  .timerbox .lbl{color:var(--ink);font-family:var(--serif);font-size:18px;font-weight:500}
  .dial{position:relative;width:188px;height:188px;margin:20px auto 10px}
  .dial svg{transform:rotate(-90deg)}
  .dial .time{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:46px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-1px;color:var(--ink)}
  .timerbox .row{display:flex;gap:7px;margin-top:6px}
  .chip{flex:1;background:transparent;border:1px solid var(--line2);color:var(--ink2);border-radius:11px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .timerbox .ctrl{display:flex;gap:8px;margin-top:16px}

  /* PROGRESS */
  .week{display:flex;gap:8px;margin:4px 0 8px}
  .dot{flex:1;border-radius:16px;background:var(--card);border:1px solid var(--line);padding:16px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;color:var(--muted);box-shadow:var(--shadow)}
  .dot b{font-family:var(--serif);font-size:18px;font-weight:500;color:var(--ink)}
  .dot.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .dot.on b{color:#fff}
  .plan-week{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:17px;margin-bottom:9px;box-shadow:var(--shadow)}
  .plan-week h4{font-family:var(--serif);font-size:16px;font-weight:500}
  .plan-week h4 span{color:var(--accent);font-size:12px;font-weight:600;font-family:inherit}
  .plan-week p{font-size:13px;color:var(--ink2);margin-top:4px;line-height:1.6}
  .log{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;font-size:13.5px;box-shadow:var(--shadow)}
  .log b{font-family:var(--serif);font-weight:500;font-size:15px}
  .log .d{color:var(--muted);font-size:12.5px}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:40px 10px}
  .reset{margin-top:14px;background:none;border:1px solid var(--line2);color:var(--muted);border-radius:12px;padding:12px;width:100%;font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit}

  .tip{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:17px;margin-bottom:9px;font-size:13.5px;box-shadow:var(--shadow)}
  .tip h4{font-family:var(--serif);font-size:16px;margin-bottom:5px;font-weight:500}
  .tip p{color:var(--ink2);line-height:1.6}

  /* PROFILE SWITCH */
  .switch{max-width:520px;margin:0 auto;padding:18px 22px 0;display:flex;gap:8px}
  .switch button{flex:1;background:var(--card);border:1px solid var(--line);color:var(--ink2);border-radius:14px;padding:11px;font-size:14px;font-weight:600;letter-spacing:.2px;cursor:pointer;font-family:var(--serif);transition:all .15s;box-shadow:var(--shadow)}
  .switch button:active{transform:scale(.98)}
  .switch button.active{background:var(--accent);border-color:var(--accent);color:#fff}

  /* NAV */
  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(248,244,238,.88);backdrop-filter:blur(18px);border-top:1px solid var(--line);z-index:40}
  nav .wrap2{max-width:520px;margin:0 auto;display:flex;padding-bottom:env(safe-area-inset-bottom,0px)}
  nav button{flex:1;background:none;border:none;color:var(--muted);padding:12px 0 16px;font-size:10.5px;font-weight:600;letter-spacing:.3px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:5px}
  nav button svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  nav button.active{color:var(--accent)}

  .toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-weight:500;letter-spacing:.3px;padding:13px 24px;border-radius:99px;font-size:14px;opacity:0;transition:.3s;z-index:60;pointer-events:none;box-shadow:0 12px 34px rgba(43,40,35,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="switch" id="profSwitch">
  <button data-prof="julia" class="active">Julia</button>
  <button data-prof="mama">Ewelina</button>
</div>

<header>
  <div class="kicker" id="hKicker">Plan treningowy</div>
  <div class="title" id="hTitle">Twój trening w domu</div>
  <div class="subtitle" id="hSub">Ujędrnianie sylwetki · poziom początkujący · 3× w tygodniu</div>
  <div class="stats">
    <div class="stat"><b id="stStreak">0</b><small>seria (tyg.)</small></div>
    <div class="stat"><b id="stTotal">0</b><small>treningów</small></div>
    <div class="stat"><b id="stWeek">0/3</b><small>w tym tyg.</small></div>
  </div>
</header>

<main class="wrap">

  <!-- PLAN -->
  <section id="v-plan" class="view active">
    <div class="note" id="planNote"></div>

    <h2 class="section" id="weekTitle">Twój tydzień</h2>
    <div id="dayList"></div>

    <h2 class="section">Wskazówki</h2>
    <div id="tipList"></div>
  </section>

  <!-- WORKOUT -->
  <section id="v-workout" class="view">
    <div id="workoutHead"></div>
    <div class="progressbar"><i id="wProg"></i></div>
    <div id="exList"></div>
    <div class="finishbar">
      <button class="btn big" id="finishBtn" disabled>Zakończ trening</button>
    </div>
  </section>

  <!-- PROGRESS -->
  <section id="v-progress" class="view">
    <h2 class="section">Ten tydzień</h2>
    <div class="week" id="weekDots"></div>

    <h2 class="section" id="progTitle">Plan progresji (8 tygodni)</h2>
    <div id="progList"></div>

    <h2 class="section">Historia</h2>
    <div id="logList"></div>
    <button class="reset" id="resetBtn">Wyczyść wszystkie dane</button>
  </section>

</main>

<!-- TIMER -->
<div class="modal" id="timerModal">
  <div class="timerbox">
    <div class="lbl" id="timerLbl">Przerwa</div>
    <div class="dial">
      <svg width="190" height="190">
        <circle cx="95" cy="95" r="82" stroke="#ece6db" stroke-width="11" fill="none"/>
        <circle id="ring" cx="95" cy="95" r="82" stroke="var(--accent)" stroke-width="11" fill="none" stroke-linecap="round" stroke-dasharray="515" stroke-dashoffset="0"/>
      </svg>
      <div class="time" id="timerTime">0:30</div>
    </div>
    <div class="row">
      <button class="chip" data-sec="20">20s</button>
      <button class="chip active" data-sec="30">30s</button>
      <button class="chip" data-sec="45">45s</button>
      <button class="chip" data-sec="60">60s</button>
    </div>
    <div class="ctrl">
      <button class="btn ghost" id="timerClose">Zamknij</button>
      <button class="btn fill" id="timerStart">Start</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- NAV -->
<nav>
  <div class="wrap2">
    <button class="active" data-view="plan"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 4l9 6.5"/><path d="M5 9.5V20h14V9.5"/></svg>Plan</button>
    <button data-view="workout"><svg viewBox="0 0 24 24"><path d="M6 9v6M18 9v6M4 11h2M18 11h2M6 12h12"/></svg>Trening</button>
    <button data-view="progress"><svg viewBox="0 0 24 24"><path d="M4 19V5M4 19h16M8 15l3-4 3 2 4-6"/></svg>Postępy</button>
  </div>
</nav>

<script>
/* ====================== ANIMACJE (rysunkowe sylwetki) ====================== */
function P(a){
  const [sh,hip,elb,hand,kA,anA,kB,anB]=a;
  const off=(s)=>{const [x,y]=s.split(',').map(Number);return (x-7)+','+(y+2);};
  return {
    torso:`M${sh} L${hip}`,
    limbs:`M${sh} L${elb} L${hand} M${hip} L${kA} L${anA} M${hip} L${kB} L${anB}`,
    limbB:`M${sh} L${off(elb)} L${off(hand)}`
  };
}
function fig(p1,p2,h1,h2,dur){
  dur=(dur*1.25).toFixed(2);
  const a=P(p1),b=P(p2);
  const sp='calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"';
  const an=(attr,v1,v2)=>`<animate attributeName="${attr}" dur="${dur}s" repeatCount="indefinite" values="${v1};${v2};${v1}" ${sp}/>`;
  return `<svg viewBox="14 -12 172 140" class="figsvg" preserveAspectRatio="xMidYMid meet">
    <line class="ground" x1="22" y1="120" x2="178" y2="120"/>
    <path class="limbB" d="${a.limbB}">${an('d',a.limbB,b.limbB)}</path>
    <path class="torso" d="${a.torso}">${an('d',a.torso,b.torso)}</path>
    <path class="limbs" d="${a.limbs}">${an('d',a.limbs,b.limbs)}</path>
    <circle class="head" cx="${h1[0]}" cy="${h1[1]}" r="12">${an('cx',h1[0],h2[0])}${an('cy',h1[1],h2[1])}</circle>
  </svg>`;
}
const ANIM={
  /* główne ćwiczenia */
  squat: fig(["100,42","100,76","108,58","116,72","94,98","92,120","106,98","108,120"],["112,62","96,98","124,70","140,70","104,104","92,120","110,104","106,120"],[100,24],[114,46],2.4),
  lunge: fig(["100,42","100,78","100,58","100,74","96,98","94,120","104,98","106,120"],["100,76","100,92","100,86","100,100","122,100","128,120","82,110","74,120"],[100,26],[100,60],2.4),
  bridge: fig(["60,110","110,112","45,112","30,113","140,96","150,118","140,100","150,118"],["60,110","110,86","45,112","30,113","140,92","150,118","140,96","150,118"],[50,106],[50,106],2.4),
  firehydrant: fig(["70,80","120,80","70,100","70,118","120,100","120,118","120,100","120,118"],["70,80","120,80","70,100","70,118","120,100","120,118","140,80","160,72"],[60,74],[60,74],1.8),
  calf: fig(["100,40","100,78","100,58","100,74","96,98","96,118","104,98","104,118"],["100,32","100,70","100,50","100,66","96,90","96,116","104,90","104,116"],[100,24],[100,16],1.4),
  plank: fig(["78,80","120,96","70,98","58,114","148,104","168,116","148,104","168,116"],["78,78","120,94","70,98","58,114","148,102","168,114","148,102","168,114"],[66,74],[66,72],3),
  pushup: fig(["78,72","120,86","70,90","64,112","148,116","160,118","148,116","160,118"],["78,92","120,98","68,104","64,112","148,116","160,118","148,116","160,118"],[66,68],[66,88],1.8),
  dips: fig(["100,70","100,96","118,80","132,80","70,100","50,118","70,100","50,118"],["100,84","100,110","116,90","132,80","68,112","50,118","68,112","50,118"],[100,56],[100,70],1.8),
  superman: fig(["80,108","120,110","60,110","42,112","140,110","160,112","140,110","160,112"],["80,104","120,106","58,102","40,96","140,104","162,98","140,104","162,98"],[70,104],[70,98],2.4),
  pike: fig(["85,80","110,60","78,96","72,116","135,92","150,116","135,92","150,116"],["82,96","110,64","76,108","72,116","135,92","150,116","135,92","150,116"],[78,70],[74,88],1.8),
  shouldertap: fig(["80,76","120,90","74,92","68,112","146,98","166,112","146,98","166,112"],["80,76","120,90","92,72","104,70","146,98","166,112","146,98","166,112"],[68,70],[68,70],1.8),
  twist: fig(["90,70","100,100","78,80","66,84","125,92","145,84","125,96","145,90"],["110,70","100,100","122,80","134,84","125,92","145,84","125,96","145,90"],[86,56],[114,56],1.6),

      {h:"Oddech",p:"Wydech podczas wysiłku (gdy wstajesz, pchasz), wdech przy schodzeniu. Nie wstrzymuj oddechu."},
      {h:"Tempo",p:"Fazę schodzenia (w dół) wykonuj wolno, przez 2–3 sekundy. To ona najmocniej ujędrnia mięśnie."},
      {h:"Regeneracja i dieta",p:"Pij ok. 2 l wody dziennie, jedz białko (jajka, twaróg, kurczak, strączki) i wysypiaj się. Sylwetka zmienia się w czasie odpoczynku."},
      {h:"Rytm tygodnia",p:"Trenuj np. poniedziałek, środa, piątek — z dniem przerwy między sesjami."}
    ],
    progTitle:"Plan progresji (8 tygodni)",
    progression:[
      {h:"Tydzień 1–2",span:"· Adaptacja",p:"Naucz się techniki. Trzymaj się zaproponowanych serii, odpoczywaj 60–90 sek. między seriami."},
      {h:"Tydzień 3–4",span:"· Więcej powtórzeń",p:"Dodaj +2 powtórzenia do każdego ćwiczenia. Skróć przerwy do 45–60 sek."},
      {h:"Tydzień 5–6",span:"· Tempo i pauzy",p:"Schodzenie wydłuż do 3 sek. i dodaj 1-sekundową pauzę w najtrudniejszym punkcie."},
      {h:"Tydzień 7–8",span:"· Objętość",p:"Dodaj 4. serię do głównych ćwiczeń. Rozważ przejście na 4 treningi w tygodniu."}
    ],
    days:JULIA_DAYS.map(juliaDay)
  },
  mama:{
    name:"Ewelina",kicker:"Plan od fizjoterapeuty",title:"Trening na siłowni",
    subtitle:"Wzmacnianie · kręgosłup · siłownia",
    weekTitle:"Twój trening",weekTarget:2,
    note:'Plan ułożony przez fizjoterapeutę. Wykonuj w kolejności: <b>cardio, rozgrzewka z taśmą, trening, brzuch</b>. Przy każdym ćwiczeniu pilnuj prostych pleców i napiętego brzucha. Nie znasz ćwiczenia? Kliknij „Film".',
    tips:[
      {h:"Rozgrzewka to podstawa",p:"Nigdy nie pomijaj cardio i ćwiczeń z taśmą — przygotowują kręgosłup i stawy do obciążenia."},
      {h:"Słuchaj pleców",p:"Lekkie zmęczenie mięśni to dobrze. Ostry ból kręgosłupa — przerwij. W razie wątpliwości pytaj fizjoterapeutę."},
      {h:"Tempo i ciężar",p:"Ruchy powolne i kontrolowane, zwłaszcza faza powrotu. Ciężar dobierz tak, by ostatnie 2 powtórzenia były wymagające, ale technika idealna."},
      {h:"Nawodnienie i regeneracja",p:"Pij wodę, jedz białko, wysypiaj się. Mięśnie wzmacniają się między treningami."}
    ],
    progTitle:"Wskazówki treningu",
    progression:[
      {h:"Kręgosłup przede wszystkim",span:"· technika",p:"Każde ćwiczenie z prostymi plecami i napiętym brzuchem. Unikaj gwałtownych skłonów i skrętów z obciążeniem."},
      {h:"Oddech",span:"· rytm",p:"Wydech w fazie wysiłku (gdy pchasz lub ciągniesz), wdech przy powrocie. Nie wstrzymuj oddechu."},
      {h:"Regularność",span:"· 2× / tydz.",p:"Najlepiej 2 sesje w tygodniu z dniem przerwy. Rozgrzewka z taśmą za każdym razem — to ona chroni kręgosłup."}
    ],
    days:[MAMA_DAY]
  }
};
const PROFORDER=["julia","mama"];

/* ====================== STAN ====================== */
const KEY="fitdom_v3";
function blankState(){return {active:"julia",profiles:{julia:{log:[]},mama:{log:[]}}}}
function loadS(){
  try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&s.profiles){s.profiles.julia=s.profiles.julia||{log:[]};s.profiles.mama=s.profiles.mama||{log:[]};return s;}}catch(e){}
  const base=blankState();
  try{const old=JSON.parse(localStorage.getItem("fitdom_v2"));if(old&&Array.isArray(old.log))base.profiles.julia.log=old.log;}catch(e){}
  return base;
}
function saveS(s){try{localStorage.setItem(KEY,JSON.stringify(s))}catch(e){/* tryb prywatny / pełna pamięć — nie blokuj apki */}}
let state=loadS();
if(!PROFILES[state.active])state.active="julia";
let currentDay=null,currentDayObj=null,sessionDone=new Set(),trackTotal=0,currentView="plan";
/* Zapis bieżącego ekranu i treningu w toku — dzięki temu po zabiciu apki przez
   iOS (np. po obejrzeniu filmu) wracasz dokładnie tam, gdzie byłaś. */
function saveSession(){state.ui={view:currentView,day:currentDay,done:[...sessionDone]};saveS(state);}
function activeProfile(){return PROFILES[state.active]}
function pstate(){return state.profiles[state.active]}

function weekKey(d=new Date()){
  const t=new Date(d);t.setHours(0,0,0,0);
  t.setDate(t.getDate()+3-((t.getDay()+6)%7));
  const w1=new Date(t.getFullYear(),0,4);
  const wk=1+Math.round(((t-w1)/86400000-3+((w1.getDay()+6)%7))/7);
  return t.getFullYear()+"-W"+wk;
}
function thisWeekLogs(){const wk=weekKey();return pstate().log.filter(l=>l.wk===wk)}

/* ====================== RENDER ====================== */
function renderHeader(){
  const p=activeProfile();
  document.getElementById('hKicker').textContent=p.kicker;
  document.getElementById('hTitle').textContent=p.title;
  document.getElementById('hSub').textContent=p.subtitle;
  document.getElementById('weekTitle').textContent=p.weekTitle;
  document.getElementById('planNote').innerHTML=p.note;
  document.getElementById('progTitle').textContent=p.progTitle;
  document.querySelectorAll('#profSwitch button').forEach(b=>b.classList.toggle('active',b.dataset.prof===state.active));
}
function renderStats(){
  const p=activeProfile(),log=pstate().log;
  document.getElementById('stTotal').textContent=log.length;
  document.getElementById('stWeek').textContent=Math.min(thisWeekLogs().length,p.weekTarget)+"/"+p.weekTarget;
  let streak=0,d=new Date();
  for(let i=0;i<52;i++){
    const wk=weekKey(d);
    if(log.some(l=>l.wk===wk))streak++;
    else if(i>0)break;
    d.setDate(d.getDate()-7);
  }
  document.getElementById('stStreak').textContent=streak;
}
function renderDays(){
  const wrap=document.getElementById('dayList');wrap.innerHTML="";
  const tw=thisWeekLogs(),p=activeProfile();
  p.days.forEach((d,idx)=>{
    const did=tw.some(l=>l.day===d.key);
    const count=d.sections.reduce((a,s)=>a+s.items.length,0);
    const el=document.createElement('div');
    el.className="day "+d.cls+(did?" done-today":"");
    el.innerHTML=`<div class="row">
        <div class="accent-dot">${idx+1}</div>
        <div>
          <h3>${d.title}</h3>
          <div class="meta">${count} ćwiczeń · ~${d.est} min ${did?'· <span class="done">zrobione</span>':''}</div>
        </div>
        <div class="chev">›</div>
      </div>`;
    el.onclick=()=>startWorkout(d.key);
    wrap.appendChild(el);
  });
}
function renderTips(){
  const c=document.getElementById('tipList');c.innerHTML="";
  activeProfile().tips.forEach(t=>{
    const e=document.createElement('div');e.className="tip";
    e.innerHTML=`<h4>${t.h}</h4><p>${t.p}</p>`;c.appendChild(e);
  });
}
function renderProgList(){
  const c=document.getElementById('progList');c.innerHTML="";
  activeProfile().progression.forEach(w=>{
    const e=document.createElement('div');e.className="plan-week";
    e.innerHTML=`<h4>${w.h} <span>${w.span}</span></h4><p>${w.p}</p>`;c.appendChild(e);
  });
}
function seclabel(txt,cls){const e=document.createElement('div');e.className="seclabel "+(cls||"");e.textContent=txt;return e;}

function exCard(it,sec,tid,num){
  const an=it.anim?(ANIM[it.anim]||""):(ANIM[ANIMOF[it.n]]||"");
  const imgFolder=it.img||IMGOF[it.n];
  const drawn=an?`<div class="animbox"><span class="hint">animacja</span>${an}</div>`:"";
  const media=imgFolder
    ? `<div class="animbox photo"><span class="hint">zdjęcia</span><img class="pf0" loading="lazy" src="${PHOTO_BASE+imgFolder}/0.jpg" alt=""><img class="pf1" loading="lazy" src="${PHOTO_BASE+imgFolder}/1.jpg" alt=""></div>`
    : drawn;
  const timed=!!it.t;
  const sub=it.sr||(timed?it.t+" sek.":"");
  const tmLabel=timed?("Start "+it.t+"s"):"Czas";
  let btns=`<button class="btn ghost vid">Film</button>`;
  if(sec.track)btns+=`<button class="btn ghost tm">${tmLabel}</button><button class="btn fill ck">Zrobione</button>`;
  else btns+=`<button class="btn fill tm">${tmLabel}</button>`;
  const el=document.createElement('div');
  el.className="ex "+(sec.exCls||"");
  el.innerHTML=`<div class="top">
      <div class="num">${num}</div>
      <div><h4>${it.n}</h4><div class="sr">${sub}</div></div>
    </div>
    ${media}
    <div class="cue">${it.cue}</div>
    <div class="acts">${btns}</div>`;
  el.querySelector('.vid').onclick=()=>showVideo(it);
  el.querySelector('.tm').onclick=()=>openTimer(it.n,it.t||30);
  if(sec.track){el.dataset.tid=tid;const ck=el.querySelector('.ck');ck.onclick=()=>toggleEx(tid,el,ck);}
  if(imgFolder){
    const box=el.querySelector('.animbox.photo');let failed=false;
    box.querySelectorAll('img').forEach(im=>im.onerror=()=>{
      if(failed)return;failed=true;
      if(drawn){const t=document.createElement('div');t.innerHTML=drawn;box.replaceWith(t.firstElementChild);}
      else box.remove();
    });
  }
  return el;
}
function startWorkout(k){
  const p=activeProfile();
  const day=p.days.find(d=>d.key===k)||p.days[0];
  currentDay=day.key;currentDayObj=day;sessionDone=new Set();
  document.getElementById('workoutHead').innerHTML=`<div class="tag">${day.tag}</div><h2>${day.title}</h2>`;
  const list=document.getElementById('exList');list.innerHTML="";
  let tid=0;
  day.sections.forEach(sec=>{
    list.appendChild(seclabel(sec.label,sec.cls));
    sec.items.forEach((it,i)=>{
      const myTid=sec.track?tid++:null;
      list.appendChild(exCard(it,sec,myTid,i+1));
    });
  });
  trackTotal=tid;
  updateWProg();
  document.getElementById('finishBtn').onclick=finishWorkout;
  switchView('workout');
  saveSession();
}
function toggleEx(tid,el,ck){
  if(sessionDone.has(tid)){sessionDone.delete(tid);el.classList.remove('checked');ck.textContent="Zrobione";}
  else{sessionDone.add(tid);el.classList.add('checked');ck.textContent="Ukończone";if(navigator.vibrate)navigator.vibrate(12);}
  updateWProg();saveSession();
}
function updateWProg(){
  const pct=trackTotal?Math.round(sessionDone.size/trackTotal*100):0;
  document.getElementById('wProg').style.width=pct+"%";
  const left=trackTotal-sessionDone.size;
  const btn=document.getElementById('finishBtn');
  btn.disabled=left>0;
  btn.textContent=left>0?`Zostało ${left} ćwiczeń`:"Zakończ trening";
}
function finishWorkout(){
  pstate().log.unshift({day:currentDay,wk:weekKey(),ts:Date.now()});
  currentDay=null;currentDayObj=null;sessionDone=new Set();
  saveS(state);renderStats();renderDays();renderProgress();
  toast("Brawo! Trening zaliczony");
  if(navigator.vibrate)navigator.vibrate([25,35,25]);
  switchView('plan');
}

/* ====================== PROGRESS ====================== */
function renderProgress(){
  const p=activeProfile(),log=pstate().log;
  const wd=document.getElementById('weekDots');wd.innerHTML="";
  const tw=thisWeekLogs();
  if(p.days.length>1){
    p.days.forEach(d=>{
      const did=tw.some(l=>l.day===d.key);
      const el=document.createElement('div');
      el.className="dot"+(did?' on':'');
      el.innerHTML=`<b>${did?'✓':'·'}</b>${d.short||d.title}`;
      wd.appendChild(el);
    });
  }else{
    const done=tw.length;
    for(let i=0;i<p.weekTarget;i++){
      const on=i<done;
      const el=document.createElement('div');
      el.className="dot"+(on?' on':'');
      el.innerHTML=`<b>${on?'✓':'·'}</b>Sesja ${i+1}`;
      wd.appendChild(el);
    }
  }
  const titleOf=k=>{const d=p.days.find(x=>x.key===k);return d?d.title:k;};
  const ll=document.getElementById('logList');
  if(!log.length){ll.innerHTML='<div class="empty">Brak treningów. Zacznij dziś.</div>';return;}
  ll.innerHTML="";
  log.slice(0,20).forEach(l=>{
    const d=new Date(l.ts),el=document.createElement('div');el.className="log";
    el.innerHTML=`<span><b>${titleOf(l.day)}</b></span><span class="d">${d.toLocaleDateString('pl-PL',{day:'numeric',month:'short'})}, ${d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'})}</span>`;
    ll.appendChild(el);
  });
}

/* ====================== FILMY ====================== */
function showVideo(e){
  const q=encodeURIComponent((e.yt||e.n)+" instruktaż");
  const url="https://www.youtube.com/results?search_query="+q;
  // Otwarcie przez <a target=_blank> zamiast window.open — na iPhonie (apka na
  // ekranie głównym) YouTube otwiera się w nakładce Safari, a apka zostaje żywa
  // w tle, więc wracasz do niej w tym samym stanie zamiast restartu od zera.
  const a=document.createElement('a');
  a.href=url; a.target="_blank"; a.rel="noopener noreferrer";
  document.body.appendChild(a);
  a.click();
  a.remove();
}

/* ====================== TIMER ====================== */
let tInt=null,tLeft=30,tDur=30,tRunning=false,tEnd=0;const ringLen=515;
function openTimer(name,secs){
  document.getElementById('timerLbl').textContent=name||"Przerwa";
  document.getElementById('timerModal').classList.add('open');
  const s=secs||30;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',+c.dataset.sec===s));
  setDur(s);
}
function setDur(s){tDur=s;tLeft=s;drawT();}
function fmt(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,'0')}
function drawT(){document.getElementById('timerTime').textContent=fmt(tLeft);document.getElementById('ring').style.strokeDashoffset=ringLen*(1-tLeft/tDur);}
function startTimer(){
  if(tRunning){ // pauza
    clearInterval(tInt);tRunning=false;
    tLeft=Math.max(0,Math.round((tEnd-Date.now())/1000));
    document.getElementById('timerStart').textContent="Wznów";return;
  }
  if(tLeft<=0)tLeft=tDur;
  tRunning=true;tEnd=Date.now()+tLeft*1000;
  document.getElementById('timerStart').textContent="Pauza";
  tInt=setInterval(tickTimer,200);
  tickTimer();
}
/* Liczymy z bezwzględnego czasu końca (Date.now), więc odliczanie jest
   dokładne nawet gdy iOS uśpi apkę przy zgaszonym ekranie. */
function tickTimer(){
  const done=Date.now()>=tEnd;
  tLeft=Math.max(0,Math.round((tEnd-Date.now())/1000));
  drawT();
  if(done){
    clearInterval(tInt);tRunning=false;
    document.getElementById('timerStart').textContent="Start";
    document.getElementById('timerTime').textContent="Koniec";
    beep();if(navigator.vibrate)navigator.vibrate([90,50,90]);
    tLeft=tDur;
  }
}
/* Po powrocie do apki natychmiast odśwież/zakończ odliczanie. */
document.addEventListener('visibilitychange',()=>{if(tRunning&&!document.hidden)tickTimer();});
function beep(){try{const a=new(window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=820;o.type='sine';g.gain.setValueAtTime(.25,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.5);o.start();o.stop(a.currentTime+.5);}catch(e){}}
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));c.classList.add('active');clearInterval(tInt);tRunning=false;document.getElementById('timerStart').textContent="Start";setDur(+c.dataset.sec);});
document.getElementById('timerStart').onclick=startTimer;
document.getElementById('timerClose').onclick=()=>{clearInterval(tInt);tRunning=false;document.getElementById('timerStart').textContent="Start";document.getElementById('timerModal').classList.remove('open');};

/* ====================== NAV ====================== */
function switchView(v){
  currentView=v;
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('v-'+v).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  window.scrollTo(0,0);
  saveSession();
}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
  if(b.dataset.view==='workout'&&!currentDay){startWorkout(activeProfile().days[0].key);return;}
  switchView(b.dataset.view);
});

/* ====================== PROFILE SWITCH ====================== */
function setProfile(id){
  if(!PROFILES[id]||id===state.active)return;
  state.active=id;saveS(state);
  currentDay=null;currentDayObj=null;sessionDone=new Set();
  renderAll();switchView('plan');saveSession();
}
document.querySelectorAll('#profSwitch button').forEach(b=>b.onclick=()=>setProfile(b.dataset.prof));

/* ====================== TOAST + RESET ====================== */
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
document.getElementById('resetBtn').onclick=()=>{if(confirm("Wyczyścić historię i postępy dla: "+activeProfile().name+"?")){pstate().log=[];saveS(state);renderStats();renderDays();renderProgress();toast("Dane wyczyszczone");}};

/* ====================== INIT ====================== */
function renderAll(){renderHeader();renderStats();renderDays();renderTips();renderProgList();renderProgress();}
/* Odtworzenie ekranu/treningu po restarcie apki (np. iOS po obejrzeniu filmu) */
function restoreSession(){
  const ui=state.ui;if(!ui)return;
  if(ui.view==='workout'&&ui.day&&activeProfile().days.some(d=>d.key===ui.day)){
    startWorkout(ui.day);
    sessionDone=new Set(ui.done||[]);
    document.querySelectorAll('#exList .ex[data-tid]').forEach(el=>{
      if(sessionDone.has(Number(el.dataset.tid))){
        el.classList.add('checked');
        const ck=el.querySelector('.ck');if(ck)ck.textContent="Ukończone";
      }
    });
    updateWProg();saveSession();
    return;
  }
  if(ui.view==='progress')switchView('progress');
}
renderAll();
restoreSession();

/* ====================== AUTO-AKTUALIZACJA ====================== */
/* Service worker pobiera najnowszą wersję apki przy każdym otwarciu z internetem,
   więc nie trzeba usuwać i dodawać skrótu po każdej zmianie. */
if("serviceWorker" in navigator){
  // Jeśli apka jest już kontrolowana przez SW, a pojawi się nowa wersja —
  // przeładuj raz, żeby od razu działała najnowsza.
  if(navigator.serviceWorker.controller){
    let reloaded=false;
    navigator.serviceWorker.addEventListener("controllerchange",()=>{
      if(reloaded)return;reloaded=true;location.reload();
    });
  }
  navigator.serviceWorker.register("sw.js").then(reg=>{
    reg.update();
    // Co jakiś czas sprawdź, czy jest nowa wersja (gdy apka długo otwarta).
    setInterval(()=>reg.update(),60*60*1000);
  }).catch(()=>{});
}
</script>
